###############################################################################
# Qulene CI — lint, typecheck, and (placeholder) ng lint for both Angular apps.
#
# This is the Phase 0c skeleton. Phase 9a extends it with build, test, esbuild
# bundle audit, and deploy workflows.
#
# AWS auth (when needed by future steps) uses OIDC + GitHubActionsDevOpsDeployRole.
# Terraform steps must set TF_VAR_aws_profile="" to bypass the rmw-llc local default.
###############################################################################

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write          # write required by sbom job (attaches SBOM to GitHub Releases)
  id-token: write          # required for OIDC AWS auth in future deploy steps
  security-events: write   # required for SARIF uploads (CodeQL, Semgrep, OSV, Scorecard)
  pull-requests: write     # required for dependency-review PR comment

jobs:
  lint-typecheck:
    name: Lint + Typecheck (backend + packages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  ng-lint-web-app:
    name: ng lint (apps/web-app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ng lint
        run: cd apps/web-app && npx ng lint

  security:
    name: Security & Quality Scanning
    uses: ./.github/workflows/security-quality.yml
    with:
      language: typescript
      fail-on-error: false   # advisory mode — reports findings without blocking CI
    secrets: inherit
    permissions:
      actions:         read
      contents:        write   # write required by sbom job (attaches SBOM to GitHub Releases)
      id-token:        write   # required for OpenSSF Scorecard attestation
      security-events: write   # required for SARIF uploads to GitHub Security tab
      pull-requests:   write   # required for dependency-review PR comment

  ng-lint-marketing:
    name: ng lint (apps/marketing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ng lint
        run: cd apps/marketing && npx ng lint

  backend-test:
    name: Backend unit + integration tests (Vitest + MiniStack)
    runs-on: ubuntu-latest
    services:
      ministack:
        image: nahuelnucera/ministack
        ports:
          - 4566:4566
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Wait for MiniStack
        run: |
          echo "Waiting for MiniStack on port 4566..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "MiniStack is ready."
              break
            fi
            echo "  attempt $i/30 — not ready yet, waiting 2s..."
            sleep 2
          done
          curl -sf http://localhost:4566/_localstack/health || { echo "MiniStack did not become ready"; exit 1; }

      - name: Run tests
        run: cd backend && npm test

  build:
    name: Build (esbuild + ng build) + Bundle audit
    runs-on: ubuntu-latest
    needs: [lint-typecheck, ng-lint-web-app, ng-lint-marketing, backend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Lambda bundles (esbuild)
        run: cd backend && npm run build

      - name: Bundle audit — verify all Lambda entry points have a .zip
        run: |
          NAMES=$(grep -E "^\s+\w+: 'src/handlers/" backend/esbuild.config.ts \
            | awk -F: '{print $1}' | tr -d ' ')
          MISSING=()
          for NAME in $NAMES; do
            if [ ! -f "backend/dist/lambdas/${NAME}/index.zip" ]; then
              MISSING+=("${NAME}")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing Lambda bundles: ${MISSING[*]}"
            exit 1
          fi
          echo "Bundle audit passed — all Lambda bundles present."

      - name: Build web app (ng build)
        run: cd apps/web-app && npx ng build --configuration production

      - name: Build marketing (ng build)
        run: cd apps/marketing && npx ng build --configuration production
